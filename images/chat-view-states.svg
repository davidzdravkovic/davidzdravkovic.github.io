<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .state { fill: #fff; stroke: #333; stroke-width: 2; }
    .initial { fill: #f8f8f8; }
    .last { fill: #f2f8f2; }
    .edge { font-size: 11px; fill: #444; }
    .title { font-size: 14px; font-weight: 600; }
  </style>

  <text class="title" x="320" y="28" text-anchor="middle">chatView per open chat</text>

  <rect class="state initial" x="60" y="120" width="160" height="56" rx="12"/>
  <text x="140" y="152" text-anchor="middle" font-weight="600">initial</text>
  <text class="edge" x="140" y="168" text-anchor="middle">peer to storage only</text>

  <rect class="state last" x="420" y="120" width="160" height="56" rx="12"/>
  <text x="500" y="152" text-anchor="middle" font-weight="600">last_view</text>
  <text class="edge" x="500" y="168" text-anchor="middle">peer to storage and UI</text>

  <path d="M 220 148 L 420 148" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="edge" x="320" y="108" text-anchor="middle">page overlaps storage (message ids)</text>
  <text class="edge" x="320" y="124" text-anchor="middle">tryTransitionToLastView</text>

  <path d="M 500 176 L 500 260 L 140 260 L 140 176" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text class="edge" x="320" y="282" text-anchor="middle">new chat open starts in initial again</text>

  <rect class="state" x="40" y="48" width="560" height="44" rx="8" stroke-dasharray="4 3"/>
  <text x="320" y="66" text-anchor="middle" font-size="12">Also to last_view:</text>
  <text class="edge" x="320" y="82" text-anchor="middle">send (fetch idle), append caught up, empty page + storage</text>
  <text class="edge" x="320" y="96" text-anchor="middle">send while fetch in flight: pendingSeed on first fetch</text>
</svg>
